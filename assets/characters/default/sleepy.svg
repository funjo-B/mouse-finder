<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 몸체 (약간 가라앉은 느낌) -->
  <ellipse cx="60" cy="72" rx="44" ry="40" fill="#6EC6FF" stroke="#3A9BD5" stroke-width="2"/>
  <!-- 볼터치 -->
  <ellipse cx="30" cy="76" rx="10" ry="6" fill="#FFB3C1" opacity="0.4"/>
  <ellipse cx="90" cy="76" rx="10" ry="6" fill="#FFB3C1" opacity="0.4"/>
  <!-- 감은 눈 (왼쪽) -->
  <path d="M34 64 Q42 68 50 64" fill="none" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 감은 눈 (오른쪽) -->
  <path d="M70 64 Q78 68 86 64" fill="none" stroke="#2C3E50" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 입 (작은 동그라미 = 잠든 숨소리) -->
  <ellipse cx="60" cy="82" rx="4" ry="3" fill="#2C3E50"/>
  <!-- Z 표시 -->
  <text x="90" y="38" font-family="Arial" font-weight="bold" font-size="16" fill="#3A9BD5" opacity="0.7">Z</text>
  <text x="100" y="26" font-family="Arial" font-weight="bold" font-size="12" fill="#3A9BD5" opacity="0.5">z</text>
  <text x="106" y="18" font-family="Arial" font-weight="bold" font-size="9" fill="#3A9BD5" opacity="0.3">z</text>
</svg>
