<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 꼬리 (늘어짐) -->
  <path d="M95 90 Q110 85 112 78 Q113 74 108 76" fill="none" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
  <!-- 몸체 (살짝 가라앉음) -->
  <ellipse cx="60" cy="82" rx="40" ry="30" fill="#F5A623"/>
  <!-- 머리 (살짝 기울임) -->
  <circle cx="60" cy="52" r="28" fill="#F5A623"/>
  <!-- 귀 (늘어짐) -->
  <polygon points="36,32 30,10 48,26" fill="#F5A623" stroke="#E8961E" stroke-width="1"/>
  <polygon points="38,30 33,14 46,26" fill="#FFD4D4"/>
  <polygon points="84,32 90,10 72,26" fill="#F5A623" stroke="#E8961E" stroke-width="1"/>
  <polygon points="82,30 87,14 74,26" fill="#FFD4D4"/>
  <!-- 감은 눈 -->
  <path d="M40 48 Q48 52 56 48" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <path d="M64 48 Q72 52 80 48" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round"/>
  <!-- 코 -->
  <ellipse cx="60" cy="56" rx="3" ry="2" fill="#FF8A9E"/>
  <!-- 입 (작은 동그라미 — 숨소리) -->
  <ellipse cx="60" cy="62" rx="3" ry="2.5" fill="#2C3E50"/>
  <!-- 수염 -->
  <line x1="30" y1="54" x2="42" y2="55" stroke="#2C3E50" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="58" x2="42" y2="58" stroke="#2C3E50" stroke-width="1" opacity="0.3"/>
  <line x1="78" y1="55" x2="90" y2="54" stroke="#2C3E50" stroke-width="1" opacity="0.3"/>
  <line x1="78" y1="58" x2="90" y2="58" stroke="#2C3E50" stroke-width="1" opacity="0.3"/>
  <!-- Z 표시 -->
  <text x="88" y="30" font-family="Arial" font-weight="bold" font-size="16" fill="#F5A623" opacity="0.7">Z</text>
  <text x="98" y="20" font-family="Arial" font-weight="bold" font-size="12" fill="#F5A623" opacity="0.5">z</text>
  <text x="104" y="12" font-family="Arial" font-weight="bold" font-size="9" fill="#F5A623" opacity="0.3">z</text>
  <!-- 앞발 (모은 채 자는 포즈) -->
  <ellipse cx="48" cy="102" rx="12" ry="6" fill="#F5A623"/>
  <ellipse cx="72" cy="102" rx="12" ry="6" fill="#F5A623"/>
</svg>
