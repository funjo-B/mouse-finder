<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 몸체 (약간 들뜬 느낌) -->
  <ellipse cx="60" cy="66" rx="46" ry="43" fill="#6EC6FF" stroke="#3A9BD5" stroke-width="2"/>
  <!-- 볼터치 (더 진하게) -->
  <ellipse cx="26" cy="70" rx="11" ry="7" fill="#FFB3C1" opacity="0.7"/>
  <ellipse cx="94" cy="70" rx="11" ry="7" fill="#FFB3C1" opacity="0.7"/>
  <!-- 왼쪽 눈 (반짝, 별 모양) -->
