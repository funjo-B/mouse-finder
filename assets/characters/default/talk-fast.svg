  <line x1="15" y1="40" x2="8" y2="35" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="40" x2="112" y2="35" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="50" x2="4" y2="50" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="50" x2="116" y2="50" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
